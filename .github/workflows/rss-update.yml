name: Update RSS Feeds

on:
  schedule:
    - cron: "0 * * * *"   # run every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Run RSS generator
        run: |
          echo "Starting RSS generation..."
          python -u scripts/generate_rss.py
          echo "RSS generation finished."

      - name: Commit and push RSS feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rss/*.xml

          git commit -m "Update RSS feeds [skip ci]" || echo "No changes to commit"

          git push